<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="10"/>
  
  <!-- Decorative elements -->
  <circle cx="720" cy="40" r="80" fill="#e94560" opacity="0.1"/>
  <circle cx="750" cy="160" r="60" fill="#0f3460" opacity="0.3"/>
  
  <!-- Main title -->
  <text x="50" y="85" font-family="SF Mono, Monaco, Consolas, monospace" font-size="42" font-weight="bold" fill="#ffffff">ipo-feedback-skill</text>
  
  <!-- Subtitle -->
  <text x="50" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#a0aec0">Automated IPO Review Feedback Scraper for AI Agents</text>
  
  <!-- Exchange badges -->
  <rect x="50" y="145" width="80" height="28" fill="#e94560" rx="5"/>
  <text x="90" y="164" font-family="SF Mono, Monaco, Consolas, monospace" font-size="12" fill="#ffffff" text-anchor="middle">BSE</text>
  
  <rect x="140" y="145" width="80" height="28" fill="#0f3460" rx="5"/>
  <text x="180" y="164" font-family="SF Mono, Monaco, Consolas, monospace" font-size="12" fill="#ffffff" text-anchor="middle">SSE</text>
  
  <rect x="230" y="145" width="80" height="28" fill="#533483" rx="5"/>
  <text x="270" y="164" font-family="SF Mono, Monaco, Consolas, monospace" font-size="12" fill="#ffffff" text-anchor="middle">SZSE</text>
  
  <!-- Features -->
  <text x="340" y="164" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#718096">📄 Inquiry Letters · 📊 Feedback Replies · 📈 Prospectus</text>
</svg>
